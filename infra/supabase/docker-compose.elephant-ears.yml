# Overlay for the official Supabase Docker distribution copied into infra/supabase/runtime.
# Run with:
# docker compose -f docker-compose.yml -f docker-compose.elephant-ears.yml up -d

services:
  elephant-ears:
    build:
      context: ../../..
      dockerfile: apps/server/Dockerfile
    container_name: elephant-ears
    env_file:
      - ../../../.env
    environment:
      PORT: 8787
      SERVER_PUBLIC_URL: ${ELEPHANT_EARS_PUBLIC_URL:-http://localhost:8787}
      WEB_DIST: apps/web/dist
      CLIP_STORE_DIR: /app/.data/clips
      CLIP_RENDER_ENABLED: ${CLIP_RENDER_ENABLED:-1}
      CLIP_SILENCE_SHORTENING: ${CLIP_SILENCE_SHORTENING:-0}
      FFMPEG_PATH: ffmpeg
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      PODCASTINDEX_API_KEY: ${PODCASTINDEX_API_KEY}
      PODCASTINDEX_API_SECRET: ${PODCASTINDEX_API_SECRET}
      PODCASTINDEX_USER_AGENT: ${PODCASTINDEX_USER_AGENT}
      GOTRUE_EXTERNAL_GITHUB_ENABLED: ${GOTRUE_EXTERNAL_GITHUB_ENABLED:-false}
      GOTRUE_EXTERNAL_GITHUB_CLIENT_ID: ${GOTRUE_EXTERNAL_GITHUB_CLIENT_ID}
      GOTRUE_EXTERNAL_GITHUB_SECRET: ${GOTRUE_EXTERNAL_GITHUB_SECRET}
      GOTRUE_EXTERNAL_GITHUB_REDIRECT_URI: ${GOTRUE_EXTERNAL_GITHUB_REDIRECT_URI}
    depends_on:
      kong:
        condition: service_healthy
    ports:
      - "8787:8787"
    volumes:
      - elephant_ears_data:/app/.data
    restart: unless-stopped

volumes:
  elephant_ears_data:
