services:
  postgres:
    image: postgres:17-alpine
    container_name: elephant-pod-postgres
    environment:
      POSTGRES_DB: elephant_pod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: elephantpod
    ports:
      - '54322:5432'
    volumes:
      - elephant_pod_postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-elephant-pod.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d elephant_pod']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  elephant-pod:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    container_name: elephant-pod
    env_file:
      - ../.env
    environment:
      PORT: 8787
      WEB_DIST: apps/web/dist
      SERVER_PUBLIC_URL: ${SERVER_PUBLIC_URL:-http://localhost:8787}
      CLIP_STORE_DIR: /app/.data/clips
      MEDIA_STORE_DIR: /app/.data/media
      DATABASE_URL: postgresql://postgres:elephantpod@postgres:5432/elephant_pod
      SUPABASE_URL: ${SUPABASE_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      PODCASTINDEX_API_KEY: ${PODCASTINDEX_API_KEY}
      PODCASTINDEX_API_SECRET: ${PODCASTINDEX_API_SECRET}
      PODCASTINDEX_USER_AGENT: ${PODCASTINDEX_USER_AGENT}
      GOTRUE_EXTERNAL_GITHUB_ENABLED: ${GOTRUE_EXTERNAL_GITHUB_ENABLED:-false}
      GOTRUE_EXTERNAL_GITHUB_CLIENT_ID: ${GOTRUE_EXTERNAL_GITHUB_CLIENT_ID}
      GOTRUE_EXTERNAL_GITHUB_SECRET: ${GOTRUE_EXTERNAL_GITHUB_SECRET}
      GOTRUE_EXTERNAL_GITHUB_REDIRECT_URI: ${GOTRUE_EXTERNAL_GITHUB_REDIRECT_URI}
      CLIP_RENDER_ENABLED: "true"
      SILENCE_RENDER_ENABLED: "true"
      SMART_SKIP_ENABLED: ${SMART_SKIP_ENABLED:-false}
      SMART_SKIP_REQUIRE_AUTH: "true"
      SMART_SKIP_WHISPER_BASE_URL: ${SMART_SKIP_WHISPER_BASE_URL:-http://whisper-worker:8001}
      SMART_SKIP_SEGMENTER_BASE_URL: ${SMART_SKIP_SEGMENTER_BASE_URL:-http://codex-segmenter:8002}
      SMART_SKIP_SEGMENTER_MODEL: ${SMART_SKIP_SEGMENTER_MODEL:-gpt-5.3-codex-spark}
      SMART_SKIP_PROCESSING_CONCURRENCY: "1"
      FFMPEG_PATH: ffmpeg
    ports:
      - '8787:8787'
    volumes:
      - elephant_pod_data:/app/.data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  codex-segmenter:
    build:
      context: ..
      dockerfile: apps/segmenter/Dockerfile
    environment:
      CODEX_MODEL: ${CODEX_MODEL:-gpt-5.3-codex-spark}
      CODEX_HOME: /codex-home
      MOCK_SEGMENTER: ${MOCK_SEGMENTER:-true}
    volumes:
      - codex_home:/codex-home
    profiles: ["smart-skip"]

  whisper-worker:
    build:
      context: ..
      dockerfile: workers/whisper/Dockerfile
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3-turbo}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cuda}
      MOCK_WHISPER: ${MOCK_WHISPER:-true}
    profiles: ["smart-skip"]

# Optional self-hosted Supabase path:
# - Use the stack in `infra/supabase/docker-compose.yml` when you want Supabase auth
#   and Supabase Postgres instead of the bare local Postgres service above.
# - The app server should then use:
#   SUPABASE_URL=http://localhost:8000
#   SUPABASE_ANON_KEY=<bundle anon key>
#   SUPABASE_SERVICE_ROLE_KEY=<bundle service role key>
#   DATABASE_URL=postgresql://postgres:<password>@localhost:54322/postgres
#   # or, if the app server runs inside the same compose network:
#   # DATABASE_URL=postgresql://postgres:<password>@db:5432/postgres
# - The Supabase bundle also exposes Studio, Kong, and Mailpit for local auth testing.
# - See `infra/supabase/README.md` for the full bootstrap commands.

volumes:
  elephant_pod_postgres:
  elephant_pod_data:
  codex_home:
