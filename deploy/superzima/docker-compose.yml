services:
  postgres:
    image: postgres:17-alpine
    container_name: elephant-pod-postgres
    environment:
      POSTGRES_DB: elephant_pod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: elephantpod
    ports:
      - '54322:5432'
    volumes:
      - elephant_pod_postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-elephant-pod.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d elephant_pod']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  elephant-pod:
    image: forge.elephanthand.com/elephant-hand-games/elephant-pod-server:latest
    container_name: elephant-pod
    env_file:
      - ./.env
    environment:
      PORT: 8787
      WEB_DIST: apps/web/dist
      SERVER_PUBLIC_URL: ${SERVER_PUBLIC_URL:-https://pod.elephanthand.com}
      CLIP_STORE_DIR: /app/.data/clips
      MEDIA_STORE_DIR: /app/.data/media
      DATABASE_URL: postgresql://postgres:elephantpod@postgres:5432/elephant_pod
      SUPABASE_URL: ${SUPABASE_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      PODCASTINDEX_API_KEY: ${PODCASTINDEX_API_KEY}
      PODCASTINDEX_API_SECRET: ${PODCASTINDEX_API_SECRET}
      PODCASTINDEX_USER_AGENT: ${PODCASTINDEX_USER_AGENT}
      GOTRUE_EXTERNAL_GITHUB_ENABLED: ${GOTRUE_EXTERNAL_GITHUB_ENABLED:-false}
      GOTRUE_EXTERNAL_GITHUB_CLIENT_ID: ${GOTRUE_EXTERNAL_GITHUB_CLIENT_ID}
      GOTRUE_EXTERNAL_GITHUB_SECRET: ${GOTRUE_EXTERNAL_GITHUB_SECRET}
      GOTRUE_EXTERNAL_GITHUB_REDIRECT_URI: ${GOTRUE_EXTERNAL_GITHUB_REDIRECT_URI}
      CLIP_RENDER_ENABLED: "true"
      SILENCE_RENDER_ENABLED: "true"
      # Superzima can run the app and segmenter, but real processing should
      # override SMART_SKIP_WHISPER_BASE_URL to an external GPU/Mac host.
      SMART_SKIP_ENABLED: ${SMART_SKIP_ENABLED:-false}
      SMART_SKIP_REQUIRE_AUTH: "true"
      SMART_SKIP_WHISPER_BASE_URL: ${SMART_SKIP_WHISPER_BASE_URL:-http://whisper-worker:8001}
      SMART_SKIP_SEGMENTER_BASE_URL: ${SMART_SKIP_SEGMENTER_BASE_URL:-http://codex-segmenter:8002}
      SMART_SKIP_SEGMENTER_MODEL: ${SMART_SKIP_SEGMENTER_MODEL:-gpt-5.4-mini}
      SMART_SKIP_PROCESSING_CONCURRENCY: "1"
      FFMPEG_PATH: ffmpeg
    ports:
      # Racknerd reaches Superzima over Tailscale on the 20,000 port range.
      - '20001:8787'
    volumes:
      - elephant_pod_data:/app/.data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  codex-segmenter:
    image: forge.elephanthand.com/elephant-hand-games/elephant-pod-segmenter:latest
    environment:
      CODEX_MODEL: ${SMART_SKIP_SEGMENTER_MODEL:-gpt-5.4-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      CODEX_HOME: /codex-home
      MOCK_SEGMENTER: ${MOCK_SEGMENTER:-true}
    volumes:
      - codex_home:/codex-home
    profiles: ["smart-skip"]

  whisper-worker:
    image: forge.elephanthand.com/elephant-hand-games/elephant-pod-whisper-worker:latest
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3-turbo}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cuda}
      # Mock mode is for deployment smoke tests, not production transcripts.
      MOCK_WHISPER: ${MOCK_WHISPER:-true}
    profiles: ["smart-skip"]

volumes:
  elephant_pod_postgres:
  elephant_pod_data:
  codex_home:
