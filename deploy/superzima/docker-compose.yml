services:
  postgres:
    image: postgres:17-alpine
    container_name: daisy-pod-postgres
    environment:
      POSTGRES_DB: elephant_pod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: elephantpod
    ports:
      - '54322:5432'
    volumes:
      - elephant_pod_postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-daisy-pod.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d elephant_pod']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  daisy-pod:
    image: forge.elephanthand.com/elephant-hand-games/daisy-pod-server:latest
    container_name: daisy-pod
    env_file:
      - path: ./.env
        required: false
    environment:
      PORT: 8787
      SERVER_PUBLIC_URL: ${SERVER_PUBLIC_URL:-https://pod.elephanthand.com}
      CLIP_STORE_DIR: /app/.data/clips
      MEDIA_STORE_DIR: /app/.data/media
      DATABASE_URL: postgresql://postgres:elephantpod@postgres:5432/elephant_pod
      PODCASTINDEX_API_KEY: ${PODCASTINDEX_API_KEY}
      PODCASTINDEX_API_SECRET: ${PODCASTINDEX_API_SECRET}
      PODCASTINDEX_USER_AGENT: ${PODCASTINDEX_USER_AGENT}
      APPLE_SIGN_IN_AUDIENCE: ${APPLE_SIGN_IN_AUDIENCE:-com.elephanthand.daisypod}
      CLIP_RENDER_ENABLED: "true"
      SILENCE_RENDER_ENABLED: "true"
      SERVER_MAX_JOBS: ${SERVER_MAX_JOBS:-1}
      YOUTUBE_IMPORT_ENABLED: ${YOUTUBE_IMPORT_ENABLED:-true}
      YTDLP_PATH: ${YTDLP_PATH:-yt-dlp}
      YOUTUBE_METADATA_MAX_ENTRIES: ${YOUTUBE_METADATA_MAX_ENTRIES:-500}
      YOUTUBE_AUDIO_QUALITY: ${YOUTUBE_AUDIO_QUALITY:-0}
      # Superzima can run the app and segmenter, but real processing should
      # override SMART_SKIP_WHISPER_BASE_URL to an external GPU/Mac host.
      SMART_SKIP_ENABLED: ${SMART_SKIP_ENABLED:-false}
      SMART_SKIP_REQUIRE_AUTH: "true"
      SMART_SKIP_WHISPER_BASE_URL: ${SMART_SKIP_WHISPER_BASE_URL:-http://whisper-worker:8001}
      SMART_SKIP_WHISPER_FORMAT: ${SMART_SKIP_WHISPER_FORMAT:-contract}
      SMART_SKIP_WHISPER_MODEL: ${SMART_SKIP_WHISPER_MODEL:-large-v3-turbo}
      SMART_SKIP_SEGMENTER_BASE_URL: ${SMART_SKIP_SEGMENTER_BASE_URL:-http://openai-batch-segmenter:8002}
      SMART_SKIP_SEGMENTER_MODEL: ${SMART_SKIP_SEGMENTER_MODEL:-gpt-5.4-mini}
      SMART_SKIP_SEGMENTER_BATCH_ENABLED: ${SMART_SKIP_SEGMENTER_BATCH_ENABLED:-true}
      SMART_SKIP_SEGMENTER_BATCH_CHECK_INTERVAL_MINUTES: ${SMART_SKIP_SEGMENTER_BATCH_CHECK_INTERVAL_MINUTES:-720}
      SMART_SKIP_PROCESSING_CONCURRENCY: "1"
      FFMPEG_PATH: ffmpeg
    ports:
      # Racknerd reaches Superzima over Tailscale on the 20,000 port range.
      - '20001:8787'
    volumes:
      - elephant_pod_data:/app/.data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  openai-batch-segmenter:
    image: forge.elephanthand.com/elephant-hand-games/daisy-pod-segmenter:latest
    environment:
      SEGMENTER_MODEL: ${SMART_SKIP_SEGMENTER_MODEL:-gpt-5.4-mini}
      # Segmenter backend options: "none" disables real segmenting;
      # "openai_batch" uses OpenAI Batch API against /v1/responses.
      SEGMENTER_BACKEND: ${SEGMENTER_BACKEND:-openai_batch}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      MOCK_SEGMENTER: ${MOCK_SEGMENTER:-true}
    profiles: ["smart-skip"]

  whisper-worker:
    image: forge.elephanthand.com/elephant-hand-games/daisy-pod-whisper-worker:latest
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3-turbo}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cuda}
      # Mock mode is for deployment smoke tests, not production transcripts.
      MOCK_WHISPER: ${MOCK_WHISPER:-true}
    profiles: ["smart-skip"]

volumes:
  elephant_pod_postgres:
  elephant_pod_data:
