name: Publish Container

on:
  push:
    branches:
      - main
    paths:
      - apps/server/Dockerfile
      - apps/server/src/**
      - apps/segmenter/**
      - workers/whisper/**
      - package.json
      - package-lock.json
      - tsconfig.base.json
      - .forgejo/workflows/publish-container.yml
      - deploy/superzima/**
      - infra/postgres/**
  workflow_dispatch:

env:
  REGISTRY: forge.elephanthand.com
  DOCKER_HOST: tcp://172.17.0.1:2375

jobs:
  publish:
    name: Build and publish images
    runs-on: [studio]
    strategy:
      matrix:
        include:
          - name: server
            image: forge.elephanthand.com/elephant-hand-games/daisy-pod-server
            dockerfile: apps/server/Dockerfile
          - name: segmenter
            image: forge.elephanthand.com/elephant-hand-games/daisy-pod-segmenter
            dockerfile: apps/segmenter/Dockerfile
          - name: whisper-worker
            image: forge.elephanthand.com/elephant-hand-games/daisy-pod-whisper-worker
            dockerfile: workers/whisper/Dockerfile

    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Log in to Forgejo container registry
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          set -Eeuo pipefail
          registry_user="${REGISTRY_USER:-${REGISTRY_USERNAME:-}}"
          if [ -z "$registry_user" ] || [ -z "${REGISTRY_TOKEN:-}" ]; then
            echo "REGISTRY_USER/REGISTRY_USERNAME and REGISTRY_TOKEN secrets are required."
            exit 1
          fi
          printf '%s' "$REGISTRY_TOKEN" | docker login "$REGISTRY" --username "$registry_user" --password-stdin

      - name: Build and push ${{ matrix.name }} image
        run: |
          set -Eeuo pipefail

          short_sha="$(git rev-parse --short HEAD)"
          docker build \
            --file "${{ matrix.dockerfile }}" \
            --platform linux/amd64 \
            --label "org.opencontainers.image.source=https://forge.elephanthand.com/elephant-hand-games/elephant-pod" \
            --tag "${{ matrix.image }}:latest" \
            --tag "${{ matrix.image }}:sha-${short_sha}" \
            .

          docker push "${{ matrix.image }}:latest"
          docker push "${{ matrix.image }}:sha-${short_sha}"

  deploy-superzima:
    name: Refresh Superzima stack
    needs: publish
    if: ${{ forgejo.ref == 'refs/heads/main' }}
    runs-on: [studio]
    env:
      DEPLOY_ROOT: /mnt/nvme/apps/elephant-pod
      SUPERZIMA_SSH_HOST: 192.168.0.147
      SUPERZIMA_SSH_USER: turnercore
    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Prepare SSH credentials
        env:
          SUPERZIMA_SSH_PRIVATE_KEY: ${{ secrets.SUPERZIMA_SSH_PRIVATE_KEY }}
        run: |
          set -Eeuo pipefail

          install -d -m 700 "$RUNNER_TEMP/superzima-ssh"
          printf '%s\n' "$SUPERZIMA_SSH_PRIVATE_KEY" > "$RUNNER_TEMP/superzima-ssh/id_ed25519"
          chmod 600 "$RUNNER_TEMP/superzima-ssh/id_ed25519"
          ssh-keyscan -H "$SUPERZIMA_SSH_HOST" > "$RUNNER_TEMP/superzima-ssh/known_hosts"
          chmod 600 "$RUNNER_TEMP/superzima-ssh/known_hosts"

      - name: Sync deployment files
        run: |
          set -Eeuo pipefail

          ssh_opts=(
            -i "$RUNNER_TEMP/superzima-ssh/id_ed25519"
            -o UserKnownHostsFile="$RUNNER_TEMP/superzima-ssh/known_hosts"
            -o StrictHostKeyChecking=yes
            -o BatchMode=yes
          )

          ssh "${ssh_opts[@]}" "${SUPERZIMA_SSH_USER}@${SUPERZIMA_SSH_HOST}" \
            "mkdir -p '$DEPLOY_ROOT/postgres/migrations'"

          rsync -a \
            -e "ssh ${ssh_opts[*]}" \
            deploy/superzima/docker-compose.yml \
            "${SUPERZIMA_SSH_USER}@${SUPERZIMA_SSH_HOST}:$DEPLOY_ROOT/docker-compose.yml"

          rsync -a \
            -e "ssh ${ssh_opts[*]}" \
            infra/postgres/init.sql \
            "${SUPERZIMA_SSH_USER}@${SUPERZIMA_SSH_HOST}:$DEPLOY_ROOT/postgres/init.sql"

          rsync -a \
            -e "ssh ${ssh_opts[*]}" \
            infra/postgres/migrations/ \
            "${SUPERZIMA_SSH_USER}@${SUPERZIMA_SSH_HOST}:$DEPLOY_ROOT/postgres/migrations/"

      - name: Log in to Forgejo registry on the host
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          set -Eeuo pipefail

          ssh_opts=(
            -i "$RUNNER_TEMP/superzima-ssh/id_ed25519"
            -o UserKnownHostsFile="$RUNNER_TEMP/superzima-ssh/known_hosts"
            -o StrictHostKeyChecking=yes
            -o BatchMode=yes
          )

          registry_user="${REGISTRY_USER:-${REGISTRY_USERNAME:-}}"
          if [ -z "$registry_user" ] || [ -z "${REGISTRY_TOKEN:-}" ]; then
            echo "REGISTRY_USER/REGISTRY_USERNAME and REGISTRY_TOKEN secrets are required."
            exit 1
          fi
          printf '%s' "$REGISTRY_TOKEN" | ssh "${ssh_opts[@]}" "${SUPERZIMA_SSH_USER}@${SUPERZIMA_SSH_HOST}" \
            "docker login '$REGISTRY' -u '$registry_user' --password-stdin"

      - name: Pull image, migrate database, and restart the stack
        run: |
          set -Eeuo pipefail

          ssh_opts=(
            -i "$RUNNER_TEMP/superzima-ssh/id_ed25519"
            -o UserKnownHostsFile="$RUNNER_TEMP/superzima-ssh/known_hosts"
            -o StrictHostKeyChecking=yes
            -o BatchMode=yes
          )

          ssh "${ssh_opts[@]}" "${SUPERZIMA_SSH_USER}@${SUPERZIMA_SSH_HOST}" \
            "cd '$DEPLOY_ROOT' && \
             docker compose config --quiet && \
             docker compose pull && \
             docker compose up -d postgres && \
             for migration in postgres/migrations/*.sql; do \
               [ -f \"\$migration\" ] || continue; \
               docker compose exec -T postgres psql -U postgres -d elephant_pod -v ON_ERROR_STOP=1 < \"\$migration\"; \
             done && \
             docker compose up -d --force-recreate"
