name: Publish Container

on:
  push:
    branches:
      - main
    paths:
      - apps/server/Dockerfile
      - apps/server/src/**
      - apps/segmenter/**
      - apps/web/**
      - workers/whisper/**
      - package.json
      - package-lock.json
      - tsconfig.base.json
      - .forgejo/workflows/publish-container.yml
      - deploy/superzima/**
  workflow_dispatch:

env:
  REGISTRY: forge.elephanthand.com
  DOCKER_BUILD_RECORD_UPLOAD: false

jobs:
  publish:
    name: Build and publish images
    runs-on: [self-hosted, studio-runner, elephant-hand, docker, dind, linux, x64]
    strategy:
      matrix:
        include:
          - name: server
            image: forge.elephanthand.com/elephant-hand-games/elephant-pod-server
            dockerfile: apps/server/Dockerfile
          - name: segmenter
            image: forge.elephanthand.com/elephant-hand-games/elephant-pod-segmenter
            dockerfile: apps/segmenter/Dockerfile
          - name: whisper-worker
            image: forge.elephanthand.com/elephant-hand-games/elephant-pod-whisper-worker
            dockerfile: workers/whisper/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Forgejo container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
