name: Publish Container

on:
  push:
    branches:
      - main
    paths:
      - apps/server/Dockerfile
      - apps/server/src/**
      - apps/segmenter/**
      - workers/whisper/**
      - package.json
      - package-lock.json
      - tsconfig.base.json
      - .forgejo/workflows/publish-container.yml
      - deploy/superzima/**
  workflow_dispatch:

env:
  REGISTRY: forge.elephanthand.com

jobs:
  publish:
    name: Build and publish images
    runs-on: [studio]
    strategy:
      matrix:
        include:
          - name: server
            image: forge.elephanthand.com/elephant-hand-games/daisy-pod-server
            dockerfile: apps/server/Dockerfile
          - name: segmenter
            image: forge.elephanthand.com/elephant-hand-games/daisy-pod-segmenter
            dockerfile: apps/segmenter/Dockerfile
          - name: whisper-worker
            image: forge.elephanthand.com/elephant-hand-games/daisy-pod-whisper-worker
            dockerfile: workers/whisper/Dockerfile

    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Log in to Forgejo container registry
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          set -Eeuo pipefail
          registry_user="${REGISTRY_USER:-${REGISTRY_USERNAME:-}}"
          if [ -z "$registry_user" ] || [ -z "${REGISTRY_TOKEN:-}" ]; then
            echo "REGISTRY_USER/REGISTRY_USERNAME and REGISTRY_TOKEN secrets are required."
            exit 1
          fi
          printf '%s' "$REGISTRY_TOKEN" | docker login "$REGISTRY" --username "$registry_user" --password-stdin

      - name: Build and push ${{ matrix.name }} image
        run: |
          set -Eeuo pipefail

          short_sha="$(git rev-parse --short HEAD)"
          docker build \
            --file "${{ matrix.dockerfile }}" \
            --platform linux/amd64 \
            --label "org.opencontainers.image.source=https://forge.elephanthand.com/elephant-hand-games/elephant-pod" \
            --tag "${{ matrix.image }}:latest" \
            --tag "${{ matrix.image }}:sha-${short_sha}" \
            .

          docker push "${{ matrix.image }}:latest"
          docker push "${{ matrix.image }}:sha-${short_sha}"
